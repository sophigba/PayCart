<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PayCart — Sign In</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <div class="auth-page">
    <div class="form-card">

      <span class="form-logo">PayCart Electronics</span>

      <h2>Welcome Back</h2>
      <p class="form-desc">Sign in to your account to continue shopping</p>

      <!-- ERROR MESSAGE -->
      <div class="error-box" id="login-error"></div>

      <!-- EMAIL -->
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="john@example.com" required autocomplete="email"/>
      </div>

      <!-- PASSWORD -->
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password"/>
      </div>

      <!-- SUBMIT -->
      <button class="btn-primary btn-full" id="login-btn" onclick="handleLogin(event)" style="font-size:15px;padding:14px">
        Sign In →
      </button>

      <div class="form-footer" style="margin-top:20px">
        Don't have an account? <a href="register.html">Create one free</a>
      </div>

      <div class="form-footer" style="margin-top:12px">
        <a href="index.html" style="color:#888">← Back to Store</a>
      </div>

    </div>
  </div>

  <script src="app.js"></script>
  <script>
    // If already logged in, go straight to homepage
    document.addEventListener("DOMContentLoaded", () => {
      if (isLoggedIn()) window.location.href = "index.html";
    });
  </script>
</body>
</html>
